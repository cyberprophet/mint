name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build agency/Agency.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack
        run: dotnet pack agency/Agency.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkg --no-build

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://nuget.pkg.github.com/cyberprophet/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
